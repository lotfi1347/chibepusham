name: chibepusham
description: AI Fashion Try-On App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  camera: ^0.11.0+2
  image_picker: ^1.1.2

  provider: ^6.1.2

  google_mlkit_pose_detection: ^0.12.0
  google_mlkit_selfie_segmentation: ^0.7.1

  vector_math: ^2.1.4

  flutter_stripe: ^11.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/clothes/
    - assets/clothes/shirts/
    - assets/clothes/pants/
    - assets/clothes/shoes/
    - assets/clothes/hats/
    - assets/clothes/glasses/