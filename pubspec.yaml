name: chibepusham
description: AR Clothing Try-On App with Shopping System
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ?? Camera + AR
  camera: ^0.11.4

  # ?? ML Kit (Pose Detection)
  google_mlkit_pose_detection: ^0.12.0
  google_mlkit_commons: ^0.7.1

  # ?? Payment (Stripe)
  flutter_stripe: ^11.0.0
  http: ^1.2.0

  # ?? UI helpers
  provider: ^6.1.2

  # ?? Web compatibility
  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/clothes/shirts/
    - assets/clothes/pants/
    - assets/clothes/shoes/
    - assets/clothes/hats/
    - assets/clothes/glasses/